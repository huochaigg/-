<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>  
    async function todo(num) {
      if (num === 1) {
        return `${num}_aaa`
      } else if (num === 2) {
        return `${num}_bbb`
      } else if (num === 3) {
        return `${num}_ccc`
      } else if (num === 4) {
        throw new Error({
          msg: '错误'
        })
      }
    }

    async function getData(num) {
      const res = await todo(num)
      
      console.log('res', res)
      return res
    }

    console.log('getData', getData(1))
    console.log('getData', getData(2))
    console.log('getData', getData(3))
    console.log('getData', getData(4))

    console.log('')
  </script>
</body>
</html>
